<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>VAK'S CAVE</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="icon" href="data:,">
<style>
  html,body{margin:0;padding:0;background:#07070d;height:100%;overflow:hidden}
  body{display:flex;align-items:center;justify-content:center}
  canvas{image-rendering:pixelated}
  #boot-log{display:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<pre id="boot-log"></pre>
<script>
  // Debug aid: mirror uncaught errors into the DOM so headless checks can see them.
  window.__errors = [];
  window.addEventListener('error', function (e) {
    window.__errors.push(String(e.message));
    document.getElementById('boot-log').textContent = window.__errors.join('\n');
  });
  window.addEventListener('unhandledrejection', function (e) {
    window.__errors.push(String(e.reason));
    document.getElementById('boot-log').textContent = window.__errors.join('\n');
  });
</script>
<script type="module" src="src/main.js"></script>
</body>
</html>
